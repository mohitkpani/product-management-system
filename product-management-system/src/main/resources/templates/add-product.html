<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Add Product</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            background-image: url('https://images.unsplash.com/photo-1522204523234-8729aa6e3d5f');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        .overlay{
            background-color: rgba(0,0,0,0.6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 400px;
            background-color: rgba(255,255,255,0.95);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px black;
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .success-message{
            color: green;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid gray;
            font-size: 15px;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background-color: #e65c00;
            transform: scale(1.03);
        }

        .home-btn{
            display: inline-block;
            margin-top: 15px;
            width: 94%;
            padding: 12px;
            background-color: blue;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 6px;
            transition: 0.3s;
        }

        .home-btn:hover{
            background-color: darkblue;
        }

    </style>

</head>

<body>

    <div class="overlay">

        <div class="container">

            <h1>Add Product</h1>

            <!-- SUCCESS MESSAGE -->
            <p th:if="${param.success}"
               class="success-message">

                Product added successfully!

            </p>

            <!-- ADD PRODUCT FORM -->
            <form action="/save-product" method="post">

                <input type="text"
                       name="name"
                       placeholder="Enter Product Name"
                       required>

                <input type="number"
                       name="price"
                       placeholder="Enter Product Price"
                       required>

                <input type="number"
                       name="quantity"
                       placeholder="Enter Product Quantity"
                       required>

                <button type="submit">Save Product</button>

            </form>

            <!-- BACK TO HOME BUTTON -->
            <a href="/" class="home-btn">Back to Home</a>

        </div>

    </div>

</body>

</html>
